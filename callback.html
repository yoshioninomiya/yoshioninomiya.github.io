<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Tesla Auth Callback</title></head>
<body>
<h2>認証コード</h2>
<div id="code" style="font-size:18px; word-break:break-all; background:#eee; padding:16px;"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  document.getElementById('code').textContent = code || 'codeが見つかりません';
</script>
</body>
</html>
